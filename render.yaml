services:
  - type: web
    name: bullmq-job-queue-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.com
      - key: BULL_BOARD_USER
        generateValue: true
      - key: BULL_BOARD_PASSWORD
        generateValue: true
